<html><head><link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head><body style="margin:0;background:var(--paper);padding:20px;box-sizing:border-box;font-family:var(--font-body)">
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Checkbox, Radio, Switch } = window.GuideRailDesignSystem_a2763f;
function Demo(){
  const [c,setC]=React.useState(true); const [r,setR]=React.useState('ios'); const [s,setS]=React.useState(false);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:14,maxWidth:640}}>
      <div style={{display:'flex',gap:16}}>
        <Input label="Parent email" placeholder="you@example.com" style={{flex:1}}/>
        <Select label="Child's age" options={['8','10','12','14']} style={{flex:1}}/>
      </div>
      <Input label="With error" placeholder="you@example.com" error="Enter a valid email" />
      <div style={{display:'flex',gap:24,alignItems:'center'}}>
        <Checkbox label="Notify on blocked attempts" checked={c} onChange={()=>setC(v=>!v)}/>
        <Radio label="iOS" checked={r==='ios'} onChange={()=>setR('ios')}/>
        <Radio label="Android" checked={r==='android'} onChange={()=>setR('android')}/>
        <Switch label="Strict mode" checked={s} onChange={()=>setS(v=>!v)}/>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
